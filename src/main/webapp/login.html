<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login - Room Reservation</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .card { max-width: 420px; border: 1px solid #ddd; border-radius: 10px; padding: 18px; }
        label { display:block; margin-top: 10px; }
        input { width:100%; padding:10px; margin-top:6px; box-sizing: border-box; }
        button { margin-top: 14px; padding: 10px 14px; cursor:pointer; }
        .err { color: #b00020; margin-top: 10px; }
    </style>
</head>
<body>
<div class="card">
    <h2>Staff Login</h2>

    <div id="err" class="err"></div>

    <form method="post" action="login">
        <label>Username</label>
        <input name="username" required>

        <label>Password</label>
        <input name="password" type="password" required>

        <button type="submit">Login</button>
    </form>
</div>

<script>
    const p = new URLSearchParams(location.search);
    if (p.get("error") === "1") {
        document.getElementById("err").textContent = "Invalid username or password!";
    }
</script>
</body>
</html>
