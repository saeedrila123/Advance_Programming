<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reports</title>
    <style>
        body{font-family:Arial;margin:40px;}
        .card{max-width:650px;border:1px solid #ddd;border-radius:10px;padding:18px;}
        label{display:block;margin-top:10px;}
        input{padding:10px;margin-top:6px;width:100%;box-sizing:border-box;}
        button{margin-top:12px;padding:10px 14px;cursor:pointer;}
        a{display:inline-block;margin-top:12px;}
    </style>
</head>
<body>
<div class="card">
    <h2>Reports</h2>

    <h3>1) Reservations by Date Range</h3>
    <form method="get" action="report-reservations">
        <label>From (Check-in date)</label>
        <input type="date" name="from" required>

        <label>To (Check-in date)</label>
        <input type="date" name="to" required>

        <button type="submit">Generate Report</button>
    </form>

    <hr/>

    <h3>2) Revenue Summary by Date Range</h3>
    <form method="get" action="report-revenue">
        <label>From (Check-in date)</label>
        <input type="date" name="from" required>

        <label>To (Check-in date)</label>
        <input type="date" name="to" required>

        <button type="submit">Generate Revenue</button>
    </form>

    <a href="dashboard.html">Back to Dashboard</a>
</div>
</body>
</html>
