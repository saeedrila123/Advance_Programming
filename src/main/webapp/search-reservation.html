<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Search Reservation</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .card { max-width: 520px; border: 1px solid #ddd; border-radius: 10px; padding: 18px; }
        input { width:100%; padding:10px; margin-top:8px; box-sizing:border-box; }
        button { margin-top:12px; padding:10px 14px; cursor:pointer; }
    </style>
</head>
<body>
<div class="card">
    <h2>Search Reservation</h2>

    <form method="get" action="reservation-details">
        <label>Reservation No</label>
        <input name="reservationNo" placeholder="R001" required>
        <button type="submit">Search</button>
    </form>

    <p><a href="dashboard.html">Back to Dashboard</a></p>
</div>
</body>
</html>
